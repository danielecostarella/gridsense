# Mosquitto broker — GridSense
# Accepts connections from Shelly devices on the local LAN (no auth required
# on the internal network). Extend with password_file + cafile for production.

listener 1883
allow_anonymous true

# Persistence — survives container restarts
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Increase max inflight messages for bursty IoT devices
max_inflight_messages 100
