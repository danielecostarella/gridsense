services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: gridsense
      POSTGRES_PASSWORD: gridsense
      POSTGRES_DB: gridsense
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./packages/db/migrations/0000_init.sql:/docker-entrypoint-initdb.d/0000_init.sql:ro
      - ./packages/db/migrations/0001_anomalies.sql:/docker-entrypoint-initdb.d/0001_anomalies.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gridsense -d gridsense"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 5

  collector:
    build:
      context: .
      dockerfile: apps/collector/Dockerfile
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SHELLY_HOST: ${SHELLY_HOST:-192.168.1.6}
      SHELLY_POLL_INTERVAL_MS: ${SHELLY_POLL_INTERVAL_MS:-5000}
      SHELLY_TIMEOUT_MS: ${SHELLY_TIMEOUT_MS:-3000}
      SHELLY_MQTT_PREFIX: ${SHELLY_MQTT_PREFIX:-}
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      DATABASE_URL: postgres://gridsense:gridsense@timescaledb:5432/gridsense
      REDIS_URL: redis://redis:6379
      COLLECTOR_PORT: 3001
    ports:
      - "3001:3001"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SHELLY_HOST: ${SHELLY_HOST:-192.168.1.6}
      SHELLY_TIMEOUT_MS: ${SHELLY_TIMEOUT_MS:-3000}
      DATABASE_URL: postgres://gridsense:gridsense@timescaledb:5432/gridsense
      REDIS_URL: redis://redis:6379
      API_PORT: 3000
    ports:
      - "3000:3000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_INTERNAL_URL: http://api:3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3000}
    ports:
      - "3002:3002"

volumes:
  timescaledb_data:
  mosquitto_data:
