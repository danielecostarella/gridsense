services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: gridsense
      POSTGRES_PASSWORD: gridsense
      POSTGRES_DB: gridsense
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./packages/db/migrations/0000_init.sql:/docker-entrypoint-initdb.d/0000_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gridsense -d gridsense"]
      interval: 5s
      timeout: 5s
      retries: 10

  collector:
    build:
      context: .
      dockerfile: apps/collector/Dockerfile
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      SHELLY_HOST: ${SHELLY_HOST:-192.168.1.6}
      SHELLY_POLL_INTERVAL_MS: ${SHELLY_POLL_INTERVAL_MS:-5000}
      SHELLY_TIMEOUT_MS: ${SHELLY_TIMEOUT_MS:-3000}
      DATABASE_URL: postgres://gridsense:gridsense@timescaledb:5432/gridsense
      COLLECTOR_PORT: 3001
    ports:
      - "3001:3001"
    # Docker Desktop (macOS/Windows) routes host traffic automatically.
    # On Linux set COLLECTOR_NETWORK_MODE=host in .env.
    network_mode: ${COLLECTOR_NETWORK_MODE:-bridge}

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      SHELLY_HOST: ${SHELLY_HOST:-192.168.1.6}
      SHELLY_TIMEOUT_MS: ${SHELLY_TIMEOUT_MS:-3000}
      DATABASE_URL: postgres://gridsense:gridsense@timescaledb:5432/gridsense
      API_PORT: 3000
    ports:
      - "3000:3000"
    network_mode: ${COLLECTOR_NETWORK_MODE:-bridge}

volumes:
  timescaledb_data:
